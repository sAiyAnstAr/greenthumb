<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Article - Greenthumb</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#faf9f5;color:#1b1c1a;padding-bottom:80px;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-family:'Material Symbols Outlined';font-size:24px;display:inline-block;}

/* Reading progress */
#progress{position:fixed;top:0;left:0;height:3px;background:#154212;width:0;z-index:100;transition:width 0.1s;}

/* Header */
#hdr{position:sticky;top:0;z-index:40;background:rgba(250,249,245,0.97);border-bottom:1px solid rgba(194,201,187,0.4);backdrop-filter:blur(8px);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
#hdr a{color:#154212;text-decoration:none;padding:6px;border-radius:50%;display:flex;align-items:center;background:none;border:none;cursor:pointer;flex-shrink:0;}
#hdr a:hover{background:#efeeea;}
#hdr-title{font-size:20px;font-weight:700;color:#154212;letter-spacing:-0.01em;}
#hdr-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #2d5a27;flex-shrink:0;}

/* Content */
#s-loading{padding:24px 20px;}
.sk{background:linear-gradient(90deg,#efeeea 25%,#e3e2df 50%,#efeeea 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:8px;margin-bottom:12px;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

#s-error{display:none;text-align:center;padding:60px 20px;}
#s-error .icon{font-size:56px;color:#c2c9bb;display:block;margin-bottom:16px;}
#s-error p{font-size:18px;font-weight:600;color:#72796e;margin-bottom:8px;}
#s-error small{font-size:14px;color:#c2c9bb;display:block;margin-bottom:24px;}
#s-error button{background:#154212;color:white;border:none;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}

#s-content{display:none;}
#c-hero{width:100%;max-height:260px;object-fit:cover;display:none;}
#c-meta{padding:20px 20px 0;}
#c-cat{display:inline-block;background:#bcf0ae;color:#002201;font-size:12px;font-weight:700;padding:4px 14px;border-radius:50px;margin-bottom:14px;letter-spacing:0.02em;}
#c-title{font-size:28px;font-weight:700;color:#1b1c1a;line-height:1.2;margin-bottom:10px;}
#c-info{display:flex;align-items:center;gap:16px;color:#72796e;font-size:13px;margin-bottom:0;}
#c-info span{display:flex;align-items:center;gap:4px;}
#c-info .material-symbols-outlined{font-size:14px;}

#c-body{padding:20px;font-size:16px;line-height:1.8;color:#42493e;}
#c-body p{margin-bottom:16px;}
#c-body h2{font-size:20px;font-weight:700;color:#1b1c1a;margin:28px 0 10px;}

#c-yt{display:none;padding:0 20px 24px;border-top:1px solid rgba(194,201,187,0.4);}
#c-yt h3{font-size:20px;font-weight:700;color:#1b1c1a;margin:20px 0 14px;}
.yt-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin-bottom:8px;}
.yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;}
.yt-title{font-size:13px;color:#72796e;margin-bottom:16px;}

#c-related{padding:20px;border-top:1px solid rgba(194,201,187,0.4);}
#c-related h3{font-size:20px;font-weight:700;color:#1b1c1a;margin-bottom:16px;}
.rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.rel-card{background:white;border-radius:14px;padding:14px;border:1px solid rgba(194,201,187,0.3);box-shadow:0 1px 4px rgba(0,0,0,0.06);text-decoration:none;display:block;}
.rel-cat{font-size:11px;color:#72796e;margin-bottom:4px;}
.rel-title{font-size:14px;font-weight:600;color:#1b1c1a;margin-bottom:8px;}
.rel-link{font-size:12px;color:#154212;display:flex;align-items:center;gap:2px;}
.rel-link .material-symbols-outlined{font-size:14px;}

/* Complete bar */
#complete-bar{display:none;position:fixed;bottom:64px;left:12px;right:12px;background:white;border-radius:20px;padding:14px 16px;box-shadow:0 4px 24px rgba(0,0,0,0.18);z-index:50;align-items:center;gap:12px;border:2px solid #bcf0ae;}
#cb-icon{width:40px;height:40px;border-radius:50%;background:#bcf0ae;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#cb-icon .material-symbols-outlined{color:#154212;font-size:20px;font-variation-settings:'FILL' 1;}
#cb-text{flex:1;min-width:0;}
#cb-title{font-size:14px;font-weight:700;color:#154212;display:block;}
#cb-sub{font-size:12px;color:#72796e;display:block;margin-top:2px;}
#cb-btn{background:#154212;color:white;border:none;border-radius:12px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0;white-space:nowrap;}

/* Bottom nav */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid rgba(194,201,187,0.4);display:flex;justify-content:space-around;align-items:center;padding:6px 0;z-index:30;box-shadow:0 -2px 12px rgba(0,0,0,0.06);}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#72796e;font-size:11px;font-weight:500;gap:2px;padding:4px 12px;border-radius:50px;}
.nav-item .material-symbols-outlined{font-size:22px;}
.nav-item.active{background:#bcf0ae;color:#002201;}
.nav-item.active .material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
</style>
</head>
<body>
<div id="progress"></div>

<div id="hdr">
  <a href="learn.html" id="back-btn"><span class="material-symbols-outlined">arrow_back</span></a>
  <span id="hdr-title">Greenthumb</span>
  <img id="hdr-avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAEgJqIeXySJNhWaz3gdkNLVMUhLZ0Ub5bfhf3w-RZO8M61x4J8AEvpRuoFfQQcrTj59RY23TQvQj4rcN1J4v7zixexbrqf8ySPTGW39uB9VzK8v33E6PQx85t6ve4oTkmiyH7lg2W7QhpIYy8NS3lK3nrL-UgHvhxdlr1FYVpkEaQ18PY39cDsfzMhYoSu2oKJjF_q-Ax_DiMew5CeySii6P1YcKX4pUsrhd3XwdSyfHPI29EFRz3sfKX5NJeI6brN2jr2onIKHHY" alt="Profile"/>
</div>

<div id="s-loading">
  <div class="sk" style="height:18px;width:80px;"></div>
  <div class="sk" style="height:32px;width:75%;margin-top:4px;"></div>
  <div class="sk" style="height:14px;width:120px;"></div>
  <div class="sk" style="height:220px;width:100%;margin-top:16px;border-radius:12px;"></div>
  <div class="sk" style="height:14px;width:100%;margin-top:20px;"></div>
  <div class="sk" style="height:14px;width:90%;"></div>
  <div class="sk" style="height:14px;width:95%;"></div>
  <div class="sk" style="height:14px;width:80%;"></div>
  <div class="sk" style="height:14px;width:100%;"></div>
</div>

<div id="s-error">
  <span class="material-symbols-outlined icon">wifi_off</span>
  <p>Could not load article</p>
  <small id="s-error-msg"></small>
  <button onclick="loadArticle()">Try again</button>
</div>

<div id="s-content">
  <img id="c-hero" alt=""/>
  <div id="c-meta">
    <span id="c-cat"></span>
    <h1 id="c-title"></h1>
    <div id="c-info">
      <span><span class="material-symbols-outlined">schedule</span><span id="c-time"></span></span>
      <span><span class="material-symbols-outlined">import_contacts</span>Wikipedia</span>
    </div>
  </div>
  <div id="c-body"></div>
  <div id="c-yt"><h3>Watch & Learn</h3><div id="c-yt-list"></div></div>
  <div id="c-related"><h3>More to Explore</h3><div class="rel-grid" id="c-rel-grid"></div></div>
</div>

<div id="complete-bar">
  <div id="cb-icon"><span class="material-symbols-outlined">school</span></div>
  <div id="cb-text"><span id="cb-title"></span><span id="cb-sub"></span></div>
  <button id="cb-btn"></button>
</div>

<nav id="bottom-nav">
  <a href="index.html" class="nav-item"><span class="material-symbols-outlined">home</span>Home</a>
  <a href="my-garden.html" class="nav-item"><span class="material-symbols-outlined">psychology_alt</span>My Garden</a>
  <a href="scanner.html" class="nav-item"><span class="material-symbols-outlined">filter_center_focus</span>Identify</a>
  <a href="community.html" class="nav-item"><span class="material-symbols-outlined">group</span>Community</a>
  <a href="learn.html" class="nav-item active"><span class="material-symbols-outlined">school</span>Learn</a>
</nav>

<script>
// Reading progress
window.addEventListener('scroll', function(){
    var d = document.documentElement;
    var pct = d.scrollTop / (d.scrollHeight - d.clientHeight) * 100;
    document.getElementById('progress').style.width = Math.min(pct, 100) + '%';
});

// URL params
var P = {};
window.location.search.slice(1).split('&').forEach(function(p){
    var eq = p.indexOf('=');
    if(eq > 0) P[decodeURIComponent(p.slice(0,eq))] = decodeURIComponent(p.slice(eq+1).replace(/\+/g,' '));
});
var TOPIC    = P.topic    || 'Gardening';
var CATEGORY = P.category || 'Learn';
var MOD_ID   = P.module   || '';
var MOD_XP   = parseInt(P.xp || '0');
var YT_KEY   = 'AIzaSyAN9eJwek4cxcAcTzqkKMqn5KNmaC3u960';
document.title = TOPIC + ' - Greenthumb';

// XHR helper
function doXHR(url, onOK, onFail){
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 12000;
    xhr.ontimeout = function(){ if(onFail) onFail('Timeout'); };
    xhr.onerror   = function(){ if(onFail) onFail('Network error'); };
    xhr.onload    = function(){
        if(xhr.status === 200){ onOK(xhr.responseText); }
        else { if(onFail) onFail('HTTP ' + xhr.status); }
    };
    xhr.send();
}

function showError(msg){
    document.getElementById('s-loading').style.display = 'none';
    document.getElementById('s-error').style.display   = 'block';
    document.getElementById('s-error-msg').textContent  = msg || '';
}

function loadArticle(){
    document.getElementById('s-loading').style.display = 'block';
    document.getElementById('s-error').style.display   = 'none';
    document.getElementById('s-content').style.display = 'none';
    var url = 'https://en.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&exintro=1&explaintext=1&piprop=thumbnail&pithumbsize=800&redirects=1&format=json&origin=*&titles=' + encodeURIComponent(TOPIC);
    doXHR(url, function(text){
        try{
            var data  = JSON.parse(text);
            var pages = data.query && data.query.pages;
            if(!pages){ showError('No data returned'); return; }
            var pid   = Object.keys(pages)[0];
            var page  = pages[pid];
            if(pid === '-1' || !page.extract){ searchFallback(TOPIC); }
            else { render(page); }
        }catch(e){ showError('Parse error: ' + e.message); }
    }, showError);
}

function searchFallback(q){
    var url = 'https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1';
    doXHR(url, function(text){
        try{
            var data = JSON.parse(text);
            var hit  = data.query && data.query.search && data.query.search[0];
            if(!hit){ showError('No article found for: ' + q); return; }
            var url2 = 'https://en.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&exintro=1&explaintext=1&piprop=thumbnail&pithumbsize=800&redirects=1&format=json&origin=*&titles=' + encodeURIComponent(hit.title);
            doXHR(url2, function(t2){
                try{
                    var d2 = JSON.parse(t2);
                    var p2 = d2.query && d2.query.pages && d2.query.pages[Object.keys(d2.query.pages)[0]];
                    if(p2 && p2.extract){ render(p2); }
                    else { showError('Article has no content'); }
                }catch(e){ showError('Parse error: ' + e.message); }
            }, showError);
        }catch(e){ showError('Search error: ' + e.message); }
    }, showError);
}

function render(page){
    document.getElementById('s-loading').style.display = 'none';
    document.getElementById('s-content').style.display = 'block';

    document.getElementById('c-cat').textContent   = CATEGORY;
    document.getElementById('c-title').textContent = page.title || TOPIC;
    document.title = (page.title || TOPIC) + ' - Greenthumb';

    var words = (page.extract || '').split(' ').length;
    document.getElementById('c-time').textContent = Math.max(2, Math.ceil(words / 200)) + ' min read';

    if(page.thumbnail && page.thumbnail.source){
        var img = document.getElementById('c-hero');
        img.src = page.thumbnail.source;
        img.style.display = 'block';
    }

    var extract = page.extract || '';
    var paras   = extract.split('\n\n').filter(function(p){ return p.trim().length > 30; });
    var html    = paras.length
        ? paras.slice(0, 8).map(function(p){ return '<p>' + p.trim() + '</p>'; }).join('')
        : '<p>' + extract + '</p>';
    document.getElementById('c-body').innerHTML = html;

    renderRelated();
    if(MOD_ID) showComplete();
    if(YT_KEY)  loadYT();
}

function loadYT(){
    var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&q=' + encodeURIComponent(TOPIC + ' gardening') + '&type=video&maxResults=2&key=' + YT_KEY;
    doXHR(url, function(text){
        try{
            var data = JSON.parse(text);
            if(!data.items || !data.items.length) return;
            var html = data.items.map(function(v){
                return '<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/' + v.id.videoId + '" frameborder="0" allowfullscreen></iframe></div>' +
                       '<p class="yt-title">' + v.snippet.title + '</p>';
            }).join('');
            document.getElementById('c-yt-list').innerHTML = html;
            document.getElementById('c-yt').style.display = 'block';
        }catch(e){}
    }, null);
}

var RELATED = [
    {title:'Composting Guide',     topic:'Compost',                      cat:'Soil'},
    {title:'Watering Techniques',  topic:'Plant watering',               cat:'Watering'},
    {title:'Companion Planting',   topic:'Companion planting',           cat:'Plants'},
    {title:'Pest Management',      topic:'Integrated pest management',   cat:'Pests'},
    {title:'Seasonal Gardening',   topic:'Gardening',                    cat:'Seasonal'},
    {title:'Plant Propagation',    topic:'Plant propagation',            cat:'Plants'},
    {title:'Soil pH Guide',        topic:'Soil pH',                      cat:'Soil'},
    {title:'No-Dig Gardening',     topic:'No-dig gardening',             cat:'Soil'},
];
function renderRelated(){
    var list = RELATED.filter(function(r){ return r.topic !== TOPIC; }).slice(0, 4);
    document.getElementById('c-rel-grid').innerHTML = list.map(function(r){
        return '<a href="article-detail.html?topic=' + encodeURIComponent(r.topic) + '&category=' + encodeURIComponent(r.cat) + '" class="rel-card">' +
               '<div class="rel-cat">' + r.cat + '</div>' +
               '<div class="rel-title">' + r.title + '</div>' +
               '<div class="rel-link"><span class="material-symbols-outlined">arrow_forward</span>Read</div>' +
               '</a>';
    }).join('');
}

function showComplete(){
    var prog = {};
    try{ prog = JSON.parse(localStorage.getItem('gt_learn_progress') || '{}'); }catch(e){}
    var done = prog[MOD_ID] === 'done';
    document.getElementById('complete-bar').style.display = 'flex';
    document.getElementById('cb-title').textContent = done ? 'Already completed!' : 'Mark as Complete';
    document.getElementById('cb-sub').textContent   = done ? 'XP already earned'  : 'Earn ' + MOD_XP + ' XP';
    var btn = document.getElementById('cb-btn');
    btn.textContent = done ? 'Back' : 'Complete ✓';
    btn.onclick = done
        ? function(){ window.location.href = 'learn.html'; }
        : function(){
            var p = {};
            try{ p = JSON.parse(localStorage.getItem('gt_learn_progress') || '{}'); }catch(e){}
            p[MOD_ID] = 'done';
            localStorage.setItem('gt_learn_progress', JSON.stringify(p));
            window.location.href = 'learn.html?completed=' + MOD_ID + '&xp=' + MOD_XP;
        };
}

loadArticle();
</script>
</body></html>
