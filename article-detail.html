<!DOCTYPE html>
<html><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Article - Greenthumb</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#faf9f5;padding:16px;}
#hdr{display:flex;align-items:center;gap:12px;padding:12px 0 16px;}
#hdr a{color:#154212;text-decoration:none;font-size:14px;}
h1{font-size:26px;font-weight:700;color:#1b1c1a;margin-bottom:8px;line-height:1.2;}
.cat{display:inline-block;background:#bcf0ae;color:#154212;font-size:12px;font-weight:700;padding:3px 12px;border-radius:50px;margin-bottom:12px;}
.meta{font-size:13px;color:#72796e;margin-bottom:20px;}
#hero{width:100%;max-height:240px;object-fit:cover;border-radius:12px;margin-bottom:20px;display:none;}
#body p{font-size:16px;line-height:1.75;color:#42493e;margin-bottom:14px;}
#body h2{font-size:18px;font-weight:700;color:#1b1c1a;margin:20px 0 8px;}
#loading{text-align:center;padding:40px;color:#72796e;font-size:16px;}
#error-box{display:none;text-align:center;padding:40px;}
#error-box p{color:#93000a;font-weight:600;margin-bottom:12px;font-size:16px;}
button{background:#154212;color:white;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
#complete-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:white;padding:16px;border-top:2px solid #bcf0ae;align-items:center;gap:12px;}
#log{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.92);color:#4ade80;font-size:11px;font-family:monospace;padding:8px;max-height:45vh;overflow-y:auto;z-index:9999;white-space:pre-wrap;word-break:break-all;}
#log-close{position:fixed;top:4px;right:8px;background:#154212;color:white;border:none;padding:2px 8px;border-radius:4px;cursor:pointer;z-index:10000;font-size:11px;}
</style>
</head>
<body>

<div id="log">Starting...\n</div>
<button id="log-close" onclick="document.getElementById('log').style.display='none';this.style.display='none'">hide log</button>

<div id="hdr"><a href="learn.html">&#8592; Back to Learn</a></div>

<div id="loading">Loading article...</div>
<div id="error-box"><p id="error-msg">Could not load article</p><button onclick="loadArticle()">Try again</button></div>

<span id="cat" class="cat" style="display:none"></span>
<img id="hero"/>
<h1 id="title" style="display:none"></h1>
<p class="meta" id="meta" style="display:none"></p>
<div id="body"></div>

<div id="complete-bar">
<div style="flex:1"><p id="cb-title" style="font-size:14px;font-weight:600;color:#154212;"></p><span id="cb-sub" style="font-size:12px;color:#72796e;"></span></div>
<button id="cb-btn"></button>
</div>

<script>
var L = document.getElementById('log');
function log(m){ L.textContent += new Date().toLocaleTimeString()+': '+m+'\n'; L.scrollTop=9999; }

log('Script block started');

var P = {};
try {
    window.location.search.slice(1).split('&').forEach(function(p){
        var eq=p.indexOf('=');
        if(eq>0) P[decodeURIComponent(p.slice(0,eq))]=decodeURIComponent(p.slice(eq+1).replace(/\+/g,' '));
    });
} catch(e){ log('Param parse error: '+e); }

var TOPIC    = P.topic    || 'Gardening';
var CATEGORY = P.category || 'Learn';
var MOD_ID   = P.module   || '';
var MOD_XP   = parseInt(P.xp||'0');
var YT_KEY   = 'AIzaSyAN9eJwek4cxcAcTzqkKMqn5KNmaC3u960';

log('TOPIC='+TOPIC);
log('CATEGORY='+CATEGORY);
log('MOD_ID='+MOD_ID);
document.title = TOPIC + ' - Greenthumb';

function doXHR(url, onOK, onFail){
    log('XHR -> '+url.slice(0,80));
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 12000;
    xhr.ontimeout = function(){ log('XHR TIMEOUT'); if(onFail) onFail('Timeout after 12s'); };
    xhr.onerror   = function(){ log('XHR ONERROR'); if(onFail) onFail('Network error'); };
    xhr.onload = function(){
        log('XHR done: status='+xhr.status+' len='+xhr.responseText.length);
        if(xhr.status===200){ onOK(xhr.responseText); }
        else { if(onFail) onFail('HTTP '+xhr.status); }
    };
    xhr.send();
    log('XHR sent');
}

function showError(msg){
    log('showError: '+msg);
    document.getElementById('loading').style.display='none';
    document.getElementById('error-box').style.display='block';
    document.getElementById('error-msg').textContent = msg||'Could not load article';
}

function loadArticle(){
    log('loadArticle() called');
    document.getElementById('loading').style.display='block';
    document.getElementById('error-box').style.display='none';
    document.getElementById('body').innerHTML='';
    document.getElementById('title').style.display='none';
    document.getElementById('cat').style.display='none';
    document.getElementById('meta').style.display='none';

    var url = 'https://en.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&exintro=1&explaintext=1&piprop=thumbnail&pithumbsize=800&redirects=1&format=json&origin=*&titles='+encodeURIComponent(TOPIC);

    doXHR(url, function(text){
        log('Parsing JSON (len='+text.length+')');
        try {
            var data = JSON.parse(text);
            var pages = data.query && data.query.pages;
            if(!pages){ showError('No pages object in response'); return; }
            var pid = Object.keys(pages)[0];
            var page = pages[pid];
            log('pageId='+pid+' title='+(page.title||'none')+' hasExtract='+!!page.extract);
            if(pid==='-1' || !page.extract){
                log('No direct match, searching...');
                searchFallback(TOPIC);
            } else {
                render(page);
            }
        } catch(e){ showError('JSON parse error: '+e.message); }
    }, showError);
}

function searchFallback(q){
    log('searchFallback: '+q);
    var url='https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch='+encodeURIComponent(q)+'&format=json&origin=*&srlimit=1';
    doXHR(url, function(text){
        try{
            var data=JSON.parse(text);
            var results=data.query&&data.query.search;
            if(!results||!results.length){ showError('No Wikipedia article found for: '+q); return; }
            var hit=results[0].title;
            log('Search hit: '+hit);
            var url2='https://en.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&exintro=1&explaintext=1&piprop=thumbnail&pithumbsize=800&redirects=1&format=json&origin=*&titles='+encodeURIComponent(hit);
            doXHR(url2, function(t2){
                try{
                    var d2=JSON.parse(t2);
                    var p2=d2.query&&d2.query.pages&&d2.query.pages[Object.keys(d2.query.pages)[0]];
                    if(p2&&p2.extract){ render(p2); }
                    else{ showError('Article found but has no content'); }
                }catch(e){ showError('Parse error 2: '+e.message); }
            }, showError);
        }catch(e){ showError('Search parse error: '+e.message); }
    }, showError);
}

function render(page){
    log('render(): '+page.title);
    document.getElementById('loading').style.display='none';
    document.getElementById('cat').textContent  = CATEGORY;
    document.getElementById('cat').style.display = 'inline-block';
    document.getElementById('title').textContent = page.title||TOPIC;
    document.getElementById('title').style.display = 'block';
    document.title = (page.title||TOPIC)+' - Greenthumb';
    var words=(page.extract||'').split(' ').length;
    document.getElementById('meta').textContent = Math.max(2,Math.ceil(words/200))+' min read';
    document.getElementById('meta').style.display = 'block';
    if(page.thumbnail&&page.thumbnail.source){
        var img=document.getElementById('hero');
        img.src=page.thumbnail.source;
        img.style.display='block';
    }
    var extract = page.extract||'';
    var paras = extract.split('\n\n').filter(function(p){ return p.trim().length>30; });
    var html = paras.length ? paras.slice(0,8).map(function(p){ return '<p>'+p.trim()+'</p>'; }).join('') : '<p>'+extract+'</p>';
    document.getElementById('body').innerHTML = html;
    log('Rendered '+paras.length+' paragraphs');
    if(MOD_ID) showComplete();
    if(YT_KEY) loadYT();
}

function loadYT(){
    log('loadYT()');
    var url='https://www.googleapis.com/youtube/v3/search?part=snippet&q='+encodeURIComponent(TOPIC+' gardening')+'&type=video&maxResults=2&key='+YT_KEY;
    doXHR(url, function(text){
        try{
            var data=JSON.parse(text);
            if(!data.items||!data.items.length){ log('No YT results'); return; }
            log('YT: '+data.items.length+' videos');
            var h='<h2 style="font-size:18px;font-weight:700;color:#1b1c1a;margin:24px 0 12px;">Watch & Learn</h2>';
            data.items.forEach(function(v){
                h+='<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin-bottom:8px;"><iframe src="https://www.youtube.com/embed/'+v.id.videoId+'" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe></div>';
                h+='<p style="font-size:13px;color:#72796e;margin-bottom:16px;">'+v.snippet.title+'</p>';
            });
            document.getElementById('body').innerHTML += h;
        }catch(e){ log('YT parse error: '+e.message); }
    }, null);
}

function showComplete(){
    var prog={};
    try{ prog=JSON.parse(localStorage.getItem('gt_learn_progress')||'{}'); }catch(e){}
    var done=prog[MOD_ID]==='done';
    var bar=document.getElementById('complete-bar');
    bar.style.display='flex';
    document.getElementById('cb-title').textContent = done ? 'Already completed!' : 'Mark as Complete';
    document.getElementById('cb-sub').textContent   = done ? 'XP already earned'   : 'Earn '+MOD_XP+' XP';
    var btn=document.getElementById('cb-btn');
    btn.textContent = done ? 'Back' : 'Complete ✓';
    btn.onclick = done ? function(){ window.location.href='learn.html'; } : function(){
        var p={};
        try{ p=JSON.parse(localStorage.getItem('gt_learn_progress')||'{}'); }catch(e){}
        p[MOD_ID]='done';
        localStorage.setItem('gt_learn_progress',JSON.stringify(p));
        window.location.href='learn.html?completed='+MOD_ID+'&xp='+MOD_XP;
    };
}

log('Calling loadArticle...');
loadArticle();
</script>
</body></html>
