<!DOCTYPE html>
<html><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Encyclopedia Test</title>
<style>
body{margin:0;font-family:sans-serif;padding:16px;background:#f5f5f5;}
#log{background:#1b1c1a;color:#4ade80;font-size:11px;font-family:monospace;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:80px;margin-bottom:12px;}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.card img{width:100%;height:120px;object-fit:cover;display:block;}
.card .info{padding:8px;}
.card .name{font-size:13px;font-weight:700;color:#1b1c1a;}
.card .sci{font-size:11px;color:#72796e;font-style:italic;}
button{background:#154212;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:4px;}
input{width:100%;padding:10px;border:1.5px solid #ccc;border-radius:8px;font-size:14px;margin-bottom:8px;box-sizing:border-box;}
</style>
</head>
<body>
<div id="log">Ready...\n</div>
<input id="q" type="text" placeholder="Search plants..."/>
<button onclick="doSearch()">Search</button>
<button onclick="loadDefault()">Load Popular</button>
<p id="status"></p>
<div id="grid"></div>

<script>
var KEY = 'sk-H63g6a085fb86f4c417329';
var L = document.getElementById('log');
function log(m){ L.textContent += new Date().toLocaleTimeString()+': '+m+'\n'; }

log('Script started');

function doXHR(url, onOK, onFail){
    log('XHR: '+url.slice(0,70)+'...');
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 12000;
    xhr.ontimeout = function(){ log('TIMEOUT'); if(onFail) onFail('Timeout'); };
    xhr.onerror   = function(){ log('ONERROR'); if(onFail) onFail('Network error'); };
    xhr.onload    = function(){
        log('onload: status='+xhr.status+' len='+xhr.responseText.length);
        if(xhr.status===200) onOK(xhr.responseText);
        else if(onFail) onFail('HTTP '+xhr.status);
    };
    xhr.send();
    log('XHR sent');
}

function loadDefault(){
    log('loadDefault()');
    document.getElementById('status').textContent = 'Loading...';
    var url = 'https://perenual.com/api/species-list?key='+KEY+'&page=1&per_page=6';
    doXHR(url, function(text){
        try{
            var data = JSON.parse(text);
            log('Got '+((data.data&&data.data.length)||0)+' plants, total='+data.total);
            document.getElementById('status').textContent = 'Loaded '+((data.data&&data.data.length)||0)+' plants';
            render(data.data||[]);
        }catch(e){ log('PARSE ERROR: '+e.message); }
    }, function(err){ log('ERROR: '+err); });
}

function doSearch(){
    var q = document.getElementById('q').value.trim();
    if(!q){ log('Empty search'); return; }
    log('Searching: '+q);
    document.getElementById('status').textContent = 'Searching...';
    var url = 'https://perenual.com/api/species-list?key='+KEY+'&page=1&per_page=6&q='+encodeURIComponent(q);
    doXHR(url, function(text){
        try{
            var data = JSON.parse(text);
            log('Got '+((data.data&&data.data.length)||0)+' results for "'+q+'"');
            document.getElementById('status').textContent = ((data.data&&data.data.length)||0)+' results';
            render(data.data||[]);
        }catch(e){ log('PARSE ERROR: '+e.message); }
    }, function(err){ log('ERROR: '+err); });
}

function render(plants){
    if(!plants.length){ document.getElementById('grid').innerHTML='<p>No results</p>'; return; }
    document.getElementById('grid').innerHTML = plants.map(function(p){
        var name = p.common_name ? p.common_name : (p.scientific_name&&p.scientific_name[0]||'Unknown');
        var sci  = (p.scientific_name&&p.scientific_name[0])||'';
        var img  = p.default_image&&(p.default_image.medium_url||p.default_image.thumbnail)||'';
        return '<div class="card">'+(img?'<img src="'+img+'" onerror="this.style.display=\'none\'"/>':'')+'<div class="info"><div class="name">'+name+'</div><div class="sci">'+sci+'</div></div></div>';
    }).join('');
    log('Rendered '+plants.length+' cards');
}

log('Calling loadDefault...');
loadDefault();
</script>
</body></html>
