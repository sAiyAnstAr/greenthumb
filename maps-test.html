<!DOCTYPE html>
<html><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maps Test</title>
<style>
body{margin:0;font-family:sans-serif;background:#f0f8f0;}
#status{padding:20px;font-size:16px;font-weight:bold;background:white;border-bottom:1px solid #ccc;}
#map{width:100%;height:60vh;}
#log{padding:16px;font-size:13px;white-space:pre-wrap;background:#f5f5f5;max-height:30vh;overflow-y:auto;}
</style>
</head>
<body>

<div id="status">🔄 Loading Google Maps...</div>
<div id="map"></div>
<div id="log">Initialising...\n</div>

<script>
var KEY = 'AIzaSyA8xmhJJDELgPlAcAAZv-NIRnC_SWui8qw';
var log = document.getElementById('log');
var status = document.getElementById('status');

function addLog(msg) {
    log.textContent += new Date().toLocaleTimeString() + ': ' + msg + '\n';
    log.scrollTop = log.scrollHeight;
}

// Capture auth failures
window.gm_authFailure = function() {
    addLog('❌ gm_authFailure fired — API key auth problem');
    status.textContent = '❌ Auth failure — check API key restrictions';
    status.style.background = '#ffdad6';
    status.style.color = '#93000a';
};

// The callback Google Maps will call when ready
window.initMapCallback = function() {
    addLog('✅ onGoogleMapsReady fired!');
    status.textContent = '✅ Google Maps loaded successfully!';
    status.style.background = '#d4edda';
    status.style.color = '#155724';
    try {
        var map = new google.maps.Map(document.getElementById('map'), {
            center: {lat: -28.0167, lng: 153.4000},
            zoom: 15,
            mapTypeId: 'hybrid'
        });
        addLog('✅ Map object created — should be visible above');
    } catch(e) {
        addLog('❌ Map creation error: ' + e.message);
    }
};

addLog('Loading Maps script with key: ' + KEY.substring(0,20) + '...');
addLog('Current URL: ' + window.location.href);

var script = document.createElement('script');
script.src = 'https://maps.googleapis.com/maps/api/js?key=' + KEY + '&callback=initMapCallback&libraries=places,drawing&v=weekly';
script.async = true;
script.onload = function() { addLog('Script onload fired (script tag loaded)'); };
script.onerror = function(e) {
    addLog('❌ Script onerror fired — script blocked or network error');
    status.textContent = '❌ Script failed to load';
    status.style.background = '#ffdad6';
};
document.head.appendChild(script);
addLog('Script tag appended to head');

// Timeout
setTimeout(function() {
    if (!window.google || !window.google.maps) {
        addLog('⏱ 10s timeout — google.maps not defined');
        status.textContent = '⏱ Timeout — callback never fired';
        status.style.background = '#fff3cd';
    } else if (status.textContent.includes('Loading')) {
        addLog('⏱ 10s timeout — google.maps exists but callback did not fire');
        addLog('google.maps defined: ' + (!!window.google.maps));
        status.textContent = '⏱ Maps API loaded but callback blocked';
        status.style.background = '#fff3cd';
    }
}, 10000);
</script>

<p style="padding:8px 16px;font-size:12px;color:#666;">
Testing key: AIzaSyA8x... on <span id="domain"></span>
<script>document.getElementById('domain').textContent=window.location.hostname;</script>
</p>

</body></html>
