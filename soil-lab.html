<circle cx="400" cy="450" fill="url(#sun-gradient)" opacity="0.4" r="280"></circle>
<defs>
<radialgradient id="sun-gradient">
<stop offset="0%" stop-color="#ffb4a5"></stop>

</radialgradient>
</defs>

<rect class="pointer-events-auto cursor-move" fill="rgba(21, 66, 18, 0.2)" height="180" rx="4" stroke="#154212" stroke-dasharray="4 2" stroke-width="2" width="80" x="520" y="380"></rect>

<path d="M650,200 Q750,250 700,400 T600,550" fill="none" opacity="0.6" stroke="#77574d" stroke-dasharray="8 4" stroke-width="3"></path>
