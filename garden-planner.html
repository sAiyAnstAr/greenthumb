<!DOCTYPE html>
<html><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>Garden Planner - Greenthumb</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}

/* HEADER - fixed height, normal flow */
#hdr{height:56px;background:white;border-bottom:1px solid #ddd;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:20;}

/* SEARCH BAR - fixed height, normal flow */
#srchbar{height:52px;background:white;border-bottom:1px solid #ddd;padding:8px 12px;position:sticky;top:56px;z-index:20;}

/* MAP - explicit height using vh minus the two bars above */
#find-map{width:100%;height:calc(100vh - 108px);background:#e8f5e8;}

/* Step 2 toolbar */
#toolbar{height:50px;background:white;border-bottom:1px solid #ddd;padding:6px 10px;display:flex;align-items:center;gap:5px;overflow-x:auto;position:sticky;top:56px;z-index:20;}
#plan-map{width:100%;height:calc(100vh - 106px);}

/* Panels */
#property-card{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:24px 24px 0 0;padding:20px;box-shadow:0 -4px 24px rgba(0,0,0,0.2);transform:translateY(100%);transition:transform 0.3s;z-index:30;}
#property-card.show{transform:translateY(0);}
#zone-panel{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:24px 24px 0 0;padding:16px;max-height:60vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,0.18);transform:translateY(100%);transition:transform 0.3s;z-index:30;}
#zone-panel.show{transform:translateY(0);}
#plant-picker{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:24px 24px 0 0;padding:20px;max-height:65vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,0.2);transform:translateY(100%);transition:transform 0.3s;z-index:35;}
#plant-picker.show{transform:translateY(0);}
#picker-bg{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:34;display:none;}
#save-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-50px);opacity:0;background:#154212;color:white;padding:10px 24px;border-radius:50px;font-weight:700;font-size:14px;z-index:40;transition:all 0.3s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
#save-toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#step-find{display:block;min-height:100vh;}
#step-plan{display:none;min-height:100vh;}

/* Tool/zone buttons */
.tb{background:white;border:1.5px solid #ccc;border-radius:8px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:#42493e;box-shadow:0 1px 2px rgba(0,0,0,0.1);flex-shrink:0;}
.tb.on{background:#154212;color:white;border-color:#154212;}
.zt{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
.zt.on{outline:3px solid #154212;outline-offset:2px;}
.sep{width:1px;height:22px;background:#ccc;flex-shrink:0;margin:0 2px;}
.hint{position:fixed;top:120px;left:50%;transform:translateX(-50%);background:rgba(21,66,18,0.9);color:white;padding:8px 18px;border-radius:50px;font-size:12px;font-weight:600;z-index:25;white-space:nowrap;display:none;pointer-events:none;}
</style>
</head>
<body>

<!-- STEP 1: FIND PROPERTY -->
<div id="step-find">

<div id="hdr">
  <a href="my-garden.html" style="color:#154212;display:flex;flex-shrink:0;text-decoration:none;"><span class="material-symbols-outlined">arrow_back</span></a>
  <div style="flex:1;text-align:center;">
    <div style="font-size:15px;font-weight:700;color:#154212;">Garden Planner</div>
    <div style="font-size:11px;color:#72796e;">Step 1 — Find your property</div>
  </div>
  <div style="width:36px;"></div>
</div>

<div id="srchbar">
  <div style="position:relative;">
    <span class="material-symbols-outlined" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#72796e;font-size:16px;pointer-events:none;">search</span>
    <input id="find-search" type="text" placeholder="Search your address…" autocomplete="off"
      style="width:100%;padding:9px 12px 9px 32px;border-radius:10px;border:1.5px solid #ccc;background:#f5f5f5;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;"
      oninput="onSearchInput(this.value)" onkeydown="if(event.key==='Enter'){doSearch(this.value);}"/>
    <div id="search-drop" style="display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid #ccc;border-radius:10px;margin-top:4px;box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:50;max-height:220px;overflow-y:auto;"></div>
  </div>
</div>

<div id="find-map"></div>

</div><!-- end step-find -->

<!-- STEP 2: PLAN GARDEN -->
<div id="step-plan">

<div id="hdr" style="position:sticky;top:0;z-index:20;">
  <button onclick="backToFind()" style="background:none;border:none;cursor:pointer;color:#154212;display:flex;flex-shrink:0;"><span class="material-symbols-outlined">arrow_back</span></button>
  <div style="flex:1;min-width:0;text-align:center;">
    <div id="plan-title" style="font-size:14px;font-weight:700;color:#154212;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">My Property</div>
    <div style="font-size:11px;color:#72796e;">Step 2 — Draw your garden zones</div>
  </div>
  <button onclick="savePlan()" id="save-btn" style="background:#154212;color:white;border:none;border-radius:50px;padding:6px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;">
    <span class="material-symbols-outlined" style="font-size:16px;">save</span>Save
  </button>
</div>

<div id="toolbar">
  <button onclick="setTool('polygon')" id="t-polygon" class="tb"><span class="material-symbols-outlined" style="font-size:16px;">pentagon</span>Zone</button>
  <button onclick="setTool('rectangle')" id="t-rectangle" class="tb"><span class="material-symbols-outlined" style="font-size:16px;">rectangle</span></button>
  <button onclick="setTool('pan')" id="t-pan" class="tb on"><span class="material-symbols-outlined" style="font-size:16px;">pan_tool</span></button>
  <button onclick="setTool('pin')" id="t-pin" class="tb"><span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1">eco</span>Plant</button>
  <div class="sep"></div>
  <button onclick="setZT('bed')" id="z-bed" class="zt on" style="background:#4ade80;"></button>
  <button onclick="setZT('lawn')" id="z-lawn" class="zt" style="background:#86efac;"></button>
  <button onclick="setZT('veg')" id="z-veg" class="zt" style="background:#ca8a04;"></button>
  <button onclick="setZT('water')" id="z-water" class="zt" style="background:#38bdf8;"></button>
  <button onclick="setZT('patio')" id="z-patio" class="zt" style="background:#94a3b8;"></button>
  <button onclick="setZT('tree')" id="z-tree" class="zt" style="background:#166534;"></button>
  <div class="sep"></div>
  <button onclick="undoLast()" class="tb"><span class="material-symbols-outlined" style="font-size:16px;">undo</span></button>
  <button onclick="clearAll()" class="tb" style="color:#ba1a1a;"><span class="material-symbols-outlined" style="font-size:16px;">delete_sweep</span></button>
</div>

<div id="plan-map"></div>

</div><!-- end step-plan -->

<!-- Overlays -->
<div id="draw-hint" class="hint">Click points · Double-click to finish</div>
<div id="pin-hint" class="hint">Tap map to place plant pin</div>

<div id="property-card">
  <div style="width:36px;height:4px;background:#ccc;border-radius:2px;margin:0 auto 14px;"></div>
  <p id="prop-name" style="font-size:16px;font-weight:700;color:#1b1c1a;margin-bottom:4px;"></p>
  <p id="prop-coords" style="font-size:12px;color:#72796e;margin-bottom:16px;"></p>
  <button onclick="goToPlan()" style="width:100%;background:#154212;color:white;border:none;border-radius:14px;padding:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">map</span>Plan This Property
  </button>
  <button onclick="clearProp()" style="width:100%;background:none;border:none;color:#72796e;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;cursor:pointer;padding:10px 0 0;">Choose a different location</button>
</div>

<div id="zone-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <h3 id="zp-title" style="font-size:16px;font-weight:700;color:#1b1c1a;">Zone Details</h3>
    <button onclick="closeZP()" style="background:none;border:none;cursor:pointer;"><span class="material-symbols-outlined" style="color:#72796e;">close</span></button>
  </div>
  <div id="zp-body"></div>
</div>

<div id="plant-picker">
  <div style="width:36px;height:4px;background:#ccc;border-radius:2px;margin:0 auto 14px;"></div>
  <p style="font-size:16px;font-weight:700;color:#1b1c1a;margin-bottom:4px;">Place a Plant</p>
  <p style="font-size:13px;color:#72796e;margin-bottom:14px;">Select from your garden.</p>
  <div id="picker-list" style="display:flex;flex-direction:column;gap:8px;"></div>
  <button onclick="closePicker()" style="width:100%;margin-top:12px;padding:12px;border-radius:12px;border:1.5px solid #ccc;background:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#72796e;cursor:pointer;">Cancel</button>
</div>
<div id="picker-bg" onclick="closePicker()"></div>

<div id="save-toast"><span class="material-symbols-outlined" style="font-size:16px;">check_circle</span>Plan saved!</div>

<script>
var KEY =  + GMAPS_KEY + ;
var ZT = {
  bed:{l:'Garden Bed',c:'#4ade80',o:0.4}, lawn:{l:'Lawn',c:'#86efac',o:0.35},
  veg:{l:'Veggie Patch',c:'#ca8a04',o:0.4}, water:{l:'Water Feature',c:'#38bdf8',o:0.45},
  patio:{l:'Patio',c:'#94a3b8',o:0.35}, tree:{l:'Tree',c:'#166534',o:0.5}
};
var findMap, planMap, autocomplete, dm;
var prop=null, propMarker=null, tool='pan', zt='bed';
var pendingLL=null, selZone=null, zones=[], pins=[];

function getSaved(){try{return JSON.parse(localStorage.getItem('gt_garden_plan')||'null');}catch(e){return null;}}

window.gm_authFailure=function(){document.getElementById('find-map').innerHTML='<p style="padding:20px;color:red;">Maps auth failure — check API key</p>';};

window.initMapCallback=function(){
  // Small delay to ensure DOM is fully laid out before Map init
  setTimeout(function(){
    initFindMap();
    var s=getSaved();
    if(s&&s.property){prop=s.property;goToPlan(true);}
  }, 100);
};

// Load Maps
(function(){
  var s=document.createElement('script');
  s.src='https://maps.googleapis.com/maps/api/js?key='+KEY+'&libraries=places,drawing&callback=initMapCallback&v=weekly';
  s.async=true;
  s.onerror=function(){document.getElementById('find-map').innerHTML='<p style="padding:20px;color:red;">Script load failed</p>';};
  document.head.appendChild(s);
})();

function initFindMap(){
  var c={lat:-28.0167,lng:153.4};
  try{var l=JSON.parse(localStorage.getItem('gt_weather_loc'));if(l)c={lat:l.lat,lng:l.lon};}catch(e){}
  if(prop)c={lat:prop.lat,lng:prop.lng};
  // Explicitly set pixel height before Map init - CSS alone isn't enough sometimes
  var fm=document.getElementById('find-map');
  fm.style.height=(window.innerHeight-108)+'px';
  findMap=new google.maps.Map(fm,{
    center:c,zoom:16,mapTypeId:'hybrid',
    zoomControl:true,mapTypeControl:false,streetViewControl:false,fullscreenControl:false,gestureHandling:'greedy'
  });
  // Search handled by manual Nominatim dropdown (see onSearchInput/doSearch)
  findMap.addListener('click',function(e){
    new google.maps.Geocoder().geocode({location:e.latLng},function(r,s){
      selectProp(e.latLng,(s==='OK'&&r[0])?r[0].formatted_address:(e.latLng.lat().toFixed(5)+', '+e.latLng.lng().toFixed(5)));
    });
  });
  // Force resize to ensure tiles render after layout
  setTimeout(function(){
    google.maps.event.trigger(findMap,'resize');
    findMap.setCenter(findMap.getCenter());
  }, 200);
}

function selectProp(ll,addr){
  prop={lat:typeof ll.lat==='function'?ll.lat():ll.lat,lng:typeof ll.lng==='function'?ll.lng():ll.lng,address:addr};
  if(propMarker)propMarker.setMap(null);
  propMarker=new google.maps.Marker({position:{lat:prop.lat,lng:prop.lng},map:findMap,animation:google.maps.Animation.DROP,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:11,fillColor:'#154212',fillOpacity:1,strokeColor:'white',strokeWeight:2.5}});
  document.getElementById('prop-name').textContent=addr.split(',')[0];
  document.getElementById('prop-coords').textContent=prop.lat.toFixed(5)+', '+prop.lng.toFixed(5);
  document.getElementById('property-card').classList.add('show');
  if(findMap.getZoom()<19)findMap.setZoom(19);
}

function clearProp(){
  prop=null;if(propMarker){propMarker.setMap(null);propMarker=null;}
  document.getElementById('property-card').classList.remove('show');
  document.getElementById('find-search').value='';
}

function goToPlan(skipAnim){
  if(!prop&&!skipAnim)return;
  var s=getSaved()||{};s.property=prop;localStorage.setItem('gt_garden_plan',JSON.stringify(s));
  document.getElementById('step-find').style.display='none';
  document.getElementById('step-plan').style.display='block';
  document.getElementById('property-card').classList.remove('show');
  document.getElementById('plan-title').textContent=(prop.address||'').split(',')[0]||'My Property';
  if(!planMap)setTimeout(initPlanMap,50);
  else{google.maps.event.trigger(planMap,'resize');planMap.setCenter({lat:prop.lat,lng:prop.lng});}
}

function backToFind(){
  document.getElementById('step-plan').style.display='none';
  document.getElementById('step-find').style.display='block';
  setTool('pan');closeZP();
  if(findMap)google.maps.event.trigger(findMap,'resize');
}

function initPlanMap(){
  var pm=document.getElementById('plan-map');
  pm.style.height=(window.innerHeight-106)+'px';
  planMap=new google.maps.Map(pm,{
    center:{lat:prop.lat,lng:prop.lng},zoom:20,mapTypeId:'satellite',tilt:0,
    disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy'
  });
  dm=new google.maps.drawing.DrawingManager({drawingMode:null,drawingControl:false,polygonOptions:opts(),rectangleOptions:opts()});
  dm.setMap(planMap);
  google.maps.event.addListener(dm,'overlaycomplete',function(e){
    dm.setDrawingMode(null);setTool('pan');
    var z=ZT[zt]||ZT.bed;
    e.overlay.setOptions({fillColor:z.c,fillOpacity:z.o,strokeColor:z.c,strokeWeight:2.5,strokeOpacity:0.9});
    var zo={poly:e.overlay,type:zt,name:z.l,photos:[],lbl:null};
    zones.push(zo);addLbl(zo);
    e.overlay.addListener('click',function(){openZP(zo);});
  });
  planMap.addListener('click',function(e){if(tool==='pin'){pendingLL=e.latLng;openPicker();}});
  loadSaved();
}

function opts(){var z=ZT[zt]||ZT.bed;return{fillColor:z.c,fillOpacity:z.o,strokeColor:z.c,strokeWeight:2.5,strokeOpacity:0.9,editable:true,zIndex:5};}

function addLbl(zo){
  if(zo.lbl)zo.lbl.setMap(null);
  var b=new google.maps.LatLngBounds();
  var p=zo.poly.getPath?zo.poly.getPath():null;
  if(p)p.forEach(function(pt){b.extend(pt);});else if(zo.poly.getBounds)b=zo.poly.getBounds();
  zo.lbl=new google.maps.Marker({position:b.getCenter(),map:planMap,icon:{path:'M 0 0',scale:0},zIndex:10,
    label:{text:zo.name,color:'#154212',fontSize:'11px',fontWeight:'700',fontFamily:"'Plus Jakarta Sans',sans-serif"}});
}

function setTool(t){
  tool=t;
  ['polygon','rectangle','pan','pin'].forEach(function(x){var b=document.getElementById('t-'+x);if(b)b.classList.toggle('on',x===t);});
  document.getElementById('draw-hint').style.display='none';
  document.getElementById('pin-hint').style.display='none';
  if(!dm)return;
  if(t==='polygon'){dm.setOptions({polygonOptions:opts()});dm.setDrawingMode(google.maps.drawing.OverlayType.POLYGON);document.getElementById('draw-hint').style.display='block';}
  else if(t==='rectangle'){dm.setOptions({rectangleOptions:opts()});dm.setDrawingMode(google.maps.drawing.OverlayType.RECTANGLE);document.getElementById('draw-hint').style.display='block';}
  else{dm.setDrawingMode(null);if(t==='pin')document.getElementById('pin-hint').style.display='block';}
}

function setZT(t){
  zt=t;
  document.querySelectorAll('.zt').forEach(function(b){b.classList.remove('on');b.style.outline='';b.style.outlineOffset='';});
  var b=document.getElementById('z-'+t);if(b){b.classList.add('on');b.style.outline='3px solid #154212';b.style.outlineOffset='2px';}
  if(dm)dm.setOptions({polygonOptions:opts(),rectangleOptions:opts()});
}

function openZP(zo){
  selZone=zo;document.getElementById('zp-title').textContent=zo.name;
  var ph=(zo.photos||[]).map(function(u){return'<img src="'+u+'" style="width:60px;height:60px;object-fit:cover;border-radius:8px;border:2px solid #ccc;"/>';}).join('');
  document.getElementById('zp-body').innerHTML=
    '<div style="margin-bottom:10px;"><label style="font-size:13px;font-weight:600;color:#42493e;display:block;margin-bottom:4px;">Zone Name</label>'+
    '<input id="zp-n" value="'+zo.name+'" style="width:100%;padding:8px 12px;border-radius:10px;border:1.5px solid #ccc;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;"/></div>'+
    '<div style="margin-bottom:10px;"><label style="font-size:13px;font-weight:600;color:#42493e;display:block;margin-bottom:6px;">Type</label>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">'+
    Object.entries(ZT).map(function(e){var k=e[0],v=e[1];return'<button onclick="chgZT(''+k+'')" style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;border-radius:10px;border:2px solid '+(zo.type===k?'#154212':'#ccc')+';background:'+(zo.type===k?'#bcf0ae':'white')+';cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;"><div style="width:16px;height:16px;border-radius:50%;background:'+v.c+';"></div><span style="font-size:10px;font-weight:600;text-align:center;">'+v.l+'</span></button>';}).join('')+
    '</div></div>'+
    '<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><label style="font-size:13px;font-weight:600;color:#42493e;">Photos</label><button onclick="document.getElementById('zp-fi').click()" style="background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;color:#154212;font-family:'Plus Jakarta Sans',sans-serif;">+ Add</button></div>'+
    '<div id="zp-ph" style="display:flex;flex-wrap:wrap;gap:6px;">'+(ph||'<p style="font-size:12px;color:#72796e;">No photos yet</p>')+'</div>'+
    '<input type="file" id="zp-fi" accept="image/*" style="display:none;" onchange="onZPh(event)"/></div>'+
    '<div style="display:flex;gap:8px;">'+
    '<button onclick="applyZP()" style="flex:1;background:#154212;color:white;border:none;border-radius:12px;padding:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Apply</button>'+
    '<button onclick="delZone()" style="background:#ffdad6;color:#93000a;border:none;border-radius:12px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;"><span class="material-symbols-outlined" style="font-size:18px;">delete</span></button></div>';
  document.getElementById('zone-panel').classList.add('show');
}
function applyZP(){if(!selZone)return;var n=document.getElementById('zp-n').value.trim()||selZone.name;selZone.name=n;document.getElementById('zp-title').textContent=n;addLbl(selZone);closeZP();}
function chgZT(t){if(!selZone)return;var z=ZT[t]||ZT.bed;selZone.type=t;selZone.name=z.l;selZone.poly.setOptions({fillColor:z.c,fillOpacity:z.o,strokeColor:z.c});openZP(selZone);}
function delZone(){if(!selZone||!confirm('Delete?'))return;selZone.poly.setMap(null);if(selZone.lbl)selZone.lbl.setMap(null);zones=zones.filter(function(z){return z!==selZone;});selZone=null;closeZP();}
function onZPh(e){var f=e.target.files[0];if(!f||!selZone)return;e.target.value='';var r=new FileReader();r.onload=function(ev){selZone.photos.push(ev.target.result);var w=document.getElementById('zp-ph');if(w)w.innerHTML=selZone.photos.map(function(u){return'<img src="'+u+'" style="width:60px;height:60px;object-fit:cover;border-radius:8px;border:2px solid #ccc;"/>';}).join('');};r.readAsDataURL(f);}
function closeZP(){document.getElementById('zone-panel').classList.remove('show');selZone=null;}

function openPicker(){
  var plants=[];try{plants=JSON.parse(localStorage.getItem('gt_plants')||'[]');}catch(e){}
  var list=document.getElementById('picker-list');
  if(!plants.length){list.innerHTML='<div style="text-align:center;padding:16px;"><p style="color:#72796e;">No plants yet.</p><a href="add-plant.html" style="font-weight:700;color:#154212;">Add a plant →</a></div>';}
  else{list.innerHTML=plants.map(function(p){return'<button onclick="placePin(''+p.id+'')" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px;border-radius:12px;border:1.5px solid #e0e0e0;background:white;cursor:pointer;text-align:left;font-family:'Plus Jakarta Sans',sans-serif;">'+(p.img?'<img src="'+p.img+'" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;"/>':'<div style="width:40px;height:40px;border-radius:50%;background:#bcf0ae;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;">🌿</div>')+'<div style="min-width:0;"><p style="font-size:14px;font-weight:700;color:#1b1c1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;">'+(p.nickname||p.name)+'</p><p style="font-size:12px;color:#72796e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:2px 0 0;">'+(p.species||'')+'</p></div></button>';}).join('');}
  document.getElementById('plant-picker').classList.add('show');
  document.getElementById('picker-bg').style.display='block';
}
function closePicker(){document.getElementById('plant-picker').classList.remove('show');document.getElementById('picker-bg').style.display='none';pendingLL=null;setTool('pan');}
function placePin(id){
  if(!pendingLL||!planMap){closePicker();return;}
  var plants=[];try{plants=JSON.parse(localStorage.getItem('gt_plants')||'[]');}catch(e){}
  var plant=plants.find(function(p){return String(p.id)===String(id);});if(!plant){closePicker();return;}
  var svg='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="18" fill="white" stroke="#154212" stroke-width="3"/><text x="20" y="27" text-anchor="middle" font-size="20">🌿</text></svg>');
  var m=new google.maps.Marker({position:pendingLL,map:planMap,draggable:true,icon:{url:svg,scaledSize:new google.maps.Size(40,40),anchor:new google.maps.Point(20,20)},title:plant.nickname||plant.name,zIndex:20});
  var iw=new google.maps.InfoWindow({content:'<div style="font-family:'Plus Jakarta Sans',sans-serif;text-align:center;padding:4px;min-width:120px;">'+(plant.img?'<img src="'+plant.img+'" style="width:50px;height:50px;border-radius:8px;object-fit:cover;display:block;margin:0 auto 6px;"/>':'')+'<p style="font-weight:700;font-size:14px;margin:0;">'+(plant.nickname||plant.name)+'</p><a href="plant-detail.html?id='+id+'" style="font-size:12px;font-weight:700;color:#154212;">View profile →</a></div>'});
  m.addListener('click',function(){iw.open(planMap,m);});
  pins.push({marker:m,plantId:id});closePicker();
}

function savePlan(){
  var zd=zones.map(function(z){var c=[];var p=z.poly.getPath?z.poly.getPath():null;if(p)p.forEach(function(pt){c.push({lat:pt.lat(),lng:pt.lng()});});else if(z.poly.getBounds){var b=z.poly.getBounds(),ne=b.getNorthEast(),sw=b.getSouthWest();c=[{lat:ne.lat(),lng:sw.lng()},{lat:ne.lat(),lng:ne.lng()},{lat:sw.lat(),lng:ne.lng()},{lat:sw.lat(),lng:sw.lng()}];}return{type:z.type,name:z.name,coords:c,photos:z.photos||[]};});
  var pd=pins.map(function(p){var pos=p.marker.getPosition();return{plantId:p.plantId,lat:pos.lat(),lng:pos.lng()};});
  localStorage.setItem('gt_garden_plan',JSON.stringify({property:prop,zones:zd,pins:pd}));
  var t=document.getElementById('save-toast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);
  var b=document.getElementById('save-btn');b.innerHTML='<span class="material-symbols-outlined" style="font-size:16px;">check</span>Saved';
  setTimeout(function(){b.innerHTML='<span class="material-symbols-outlined" style="font-size:16px;">save</span>Save';},2200);
}
function loadSaved(){
  var s=getSaved();if(!s)return;
  var plants=[];try{plants=JSON.parse(localStorage.getItem('gt_plants')||'[]');}catch(e){}
  (s.zones||[]).forEach(function(z){if(!z.coords||!z.coords.length)return;var zt2=ZT[z.type]||ZT.bed;var poly=new google.maps.Polygon({paths:z.coords,fillColor:zt2.c,fillOpacity:zt2.o,strokeColor:zt2.c,strokeWeight:2.5,editable:true,map:planMap,zIndex:5});var zo={poly:poly,type:z.type,name:z.name,photos:z.photos||[],lbl:null};zones.push(zo);addLbl(zo);poly.addListener('click',function(){openZP(zo);});});
  (s.pins||[]).forEach(function(pin){var plant=plants.find(function(p){return String(p.id)===String(pin.plantId);});if(!plant)return;var svg='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="18" fill="white" stroke="#154212" stroke-width="3"/><text x="20" y="27" text-anchor="middle" font-size="20">🌿</text></svg>');var m=new google.maps.Marker({position:{lat:pin.lat,lng:pin.lng},map:planMap,draggable:true,icon:{url:svg,scaledSize:new google.maps.Size(40,40),anchor:new google.maps.Point(20,20)},zIndex:20});var iw=new google.maps.InfoWindow({content:'<div style="font-family:'Plus Jakarta Sans',sans-serif;text-align:center;padding:4px;"><p style="font-weight:700;">'+(plant.nickname||plant.name)+'</p><a href="plant-detail.html?id='+pin.plantId+'" style="font-size:12px;font-weight:700;color:#154212;">View profile →</a></div>'});m.addListener('click',function(){iw.open(planMap,m);});pins.push({marker:m,plantId:pin.plantId});});
}
function undoLast(){if(!zones.length)return;var l=zones.pop();l.poly.setMap(null);if(l.lbl)l.lbl.setMap(null);}
function clearAll(){if(!confirm('Clear all?'))return;zones.forEach(function(z){z.poly.setMap(null);if(z.lbl)z.lbl.setMap(null);});pins.forEach(function(p){p.marker.setMap(null);});zones=[];pins=[];closeZP();}


var _searchTimer;
function onSearchInput(q){
  clearTimeout(_searchTimer);
  if(q.length < 3){ document.getElementById('search-drop').style.display='none'; return; }
  _searchTimer = setTimeout(function(){ doSearch(q); }, 400);
}

function doSearch(q){
  if(!q || q.length < 2) return;
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=au&q='+encodeURIComponent(q))
  .then(function(r){return r.json();})
  .then(function(data){
    var drop = document.getElementById('search-drop');
    if(!data.length){ drop.style.display='none'; return; }
    drop.innerHTML = data.map(function(r){
      var short = r.display_name.split(',').slice(0,3).join(',');
      return '<div onclick="pickResult('+r.lat+','+r.lon+',''+r.display_name.replace(/'/g,"\'").substring(0,80)+'')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-family:'Plus Jakarta Sans',sans-serif;" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='white'">'+
      '<div style="font-size:14px;font-weight:600;color:#1b1c1a;">'+short.split(',')[0]+'</div>'+
      '<div style="font-size:12px;color:#72796e;">'+short.split(',').slice(1).join(',')+'</div></div>';
    }).join('');
    drop.style.display='block';
  }).catch(function(){});
}

function pickResult(lat,lng,addr){
  document.getElementById('find-search').value = addr.split(',')[0];
  document.getElementById('search-drop').style.display='none';
  var ll = {lat:parseFloat(lat), lng:parseFloat(lng)};
  findMap.panTo(ll); findMap.setZoom(19);
  selectProp(ll, addr);
}

// Close dropdown on outside click
document.addEventListener('click', function(e){
  if(!e.target.closest || !e.target.closest('#srchbar')){
    var drop = document.getElementById('search-drop');
    if(drop) drop.style.display='none';
  }
});
window.addEventListener('resize',function(){
  if(findMap){
    var fm=document.getElementById('find-map');
    if(fm){fm.style.height=(window.innerHeight-108)+'px';}
    google.maps.event.trigger(findMap,'resize');
  }
  if(planMap){
    var pm=document.getElementById('plan-map');
    if(pm){pm.style.height=(window.innerHeight-106)+'px';}
    google.maps.event.trigger(planMap,'resize');
  }
});
</script>
