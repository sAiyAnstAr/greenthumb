<style>
    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #faf9f5;
        min-height: max(884px, 100dvh);
    }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .active-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Animated score ring */
    .ring-track { fill: none; stroke: rgba(45,90,39,0.15); stroke-width: 10; }
    .ring-fill {
        fill: none; stroke: #154212; stroke-width: 10;
        stroke-linecap: round;
        stroke-dasharray: 314;
        stroke-dashoffset: 314;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
        transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ring-fill.critical { stroke: #ba1a1a; }
    .ring-fill.warning  { stroke: #802918; }
    .ring-fill.good     { stroke: #3b6934; }
    .ring-fill.great    { stroke: #154212; }

    /* Health bar mini */
    .health-bar-fill { transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

    /* Status pill colours */
    .pill-thriving  { background: #bcf0ae; color: #002201; }
    .pill-good      { background: #e9e8e4; color: #42493e; }
    .pill-attention { background: #ffdad3; color: #802918; }
    .pill-critical  { background: #ffdad6; color: #93000a; }

    /* Card left border */
    .border-thriving  { border-left-color: #3b6934; }
    .border-good      { border-left-color: #c2c9bb; }
    .border-attention { border-left-color: #802918; }
    .border-critical  { border-left-color: #ba1a1a; }

    /* Icon status colours */
    .icon-ok      { color: #3b6934; }
    .icon-warn    { color: #802918; }
    .icon-bad     { color: #ba1a1a; }
    .icon-neutral { color: #72796e; }

    /* Slide-up log panel */
    #log-panel {
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #log-panel.open { transform: translateY(0); }

    /* Filter chip active */
    .filter-chip.active { background: #154212; color: #ffffff; }

    /* Card hover */
    .plant-card { transition: box-shadow 0.2s ease, transform 0.15s ease; }
    .plant-card:hover { box-shadow: 0 6px 20px rgba(21,66,18,0.10); transform: translateY(-1px); }

    /* Tip card gradient */
    .tip-card { background: linear-gradient(135deg, #f4f4f0 0%, #e9e8e4 100%); }

    /* Alert banner */
    .alert-banner { animation: slideDown 0.3s ease; }
    @keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>

        light: 'ok',
        temp: 'ok',
        careLogs: []
    },
];

// ─── State ────────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let currentSort = 'urgency'; // 'urgency' | 'name' | 'location'
let logTargetId = null;
let selectedCareAction = null;

const sortModes = ['urgency', 'name', 'location'];
const sortLabels = { urgency: 'Urgency', name: 'Name', location: 'Location' };

const careActions = [
    { id: 'water',     icon: 'water_drop',    label: 'Watered' },
    { id: 'fertilise', icon: 'compost',        label: 'Fertilised' },
    { id: 'prune',     icon: 'content_cut',   label: 'Pruned' },
    { id: 'mist',      icon: 'air',           label: 'Misted' },
    { id: 'repot',     icon: 'yard',          label: 'Repotted' },
    { id: 'rotate',    icon: 'rotate_right',  label: 'Rotated' },
];

// ─── Score + Stats ────────────────────────────────────────────────────────────
function computeScore() {
    const avg = Math.round(plants.reduce((s, p) => s + p.healthPct, 0) / plants.length);
    return avg;
}

function renderScore() {
    const score = computeScore();
    const counts = { thriving: 0, good: 0, attention: 0, critical: 0 };
    plants.forEach(p => counts[p.status]++);

    // Ring animation: circumference = 2π×50 ≈ 314
    const offset = 314 - (314 * score / 100);
    const ring = document.getElementById('score-ring');
    setTimeout(() => { ring.style.strokeDashoffset = offset; }, 80);

    // Ring colour class
    ring.className = 'ring-fill ' + (score >= 80 ? 'great' : score >= 60 ? 'good' : score >= 40 ? 'warning' : 'critical');

    document.getElementById('score-number').textContent = score + '%';

    let headline, sub;
    if (score >= 80) { headline = 'Garden is thriving 🌿'; sub = 'Your plants are well cared for. Keep it up!'; }
    else if (score >= 60) { headline = 'Looking pretty good'; sub = 'A few plants need some extra love.'; }
    else if (score >= 40) { headline = 'Needs some attention'; sub = 'Several plants are struggling — check the list below.'; }
    else { headline = 'Garden needs urgent care'; sub = 'Act now to prevent further plant stress.'; }

    document.getElementById('score-headline').textContent = headline;
    document.getElementById('score-sub').textContent = sub;

    document.getElementById('stat-thriving').textContent = `${counts.thriving} Thriving`;
    document.getElementById('stat-good').textContent = `${counts.good} Good`;
    document.getElementById('stat-attention').textContent = `${counts.attention} Needs Attention`;
    document.getElementById('stat-critical').textContent = `${counts.critical} Critical`;

    // Alert banner
    const urgent = plants.filter(p => p.status === 'critical');
    const banner = document.getElementById('alert-banner');
    if (urgent.length > 0) {
        banner.classList.remove('hidden');
        document.getElementById('alert-text').textContent =
            urgent.length === 1
                ? `${urgent[0].name} needs urgent attention right now.`
                : `${urgent.length} plants need urgent attention — ${urgent.map(p=>p.name).join(', ')}.`;
    } else {
        banner.classList.add('hidden');
    }
}

// ─── Filter & Sort ─────────────────────────────────────────────────────────────
function setFilter(f) {
    currentFilter = f;
    ['all','critical','attention','good','thriving'].forEach(id => {
        const chip = document.getElementById('chip-' + id);
        if (chip) chip.classList.toggle('active', id === f);
    });
    renderPlants();
}

function cycleSortMode() {
    const idx = sortModes.indexOf(currentSort);
    currentSort = sortModes[(idx + 1) % sortModes.length];
    document.getElementById('sort-label').textContent = sortLabels[currentSort];
    renderPlants();
}

function sortedFiltered() {
    let list = currentFilter === 'all' ? [...plants] : plants.filter(p => p.status === currentFilter);
    const urgencyOrder = { critical: 0, attention: 1, good: 2, thriving: 3 };
    if (currentSort === 'urgency') list.sort((a,b) => urgencyOrder[a.status] - urgencyOrder[b.status]);
    else if (currentSort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
    else list.sort((a,b) => a.location.localeCompare(b.location));
    return list;
}

// ─── Plant Cards ──────────────────────────────────────────────────────────────
function statusMeta(status) {
    return {
        thriving:  { pillClass: 'pill-thriving',  border: 'border-thriving',  label: 'Thriving' },
        good:      { pillClass: 'pill-good',       border: 'border-good',      label: 'Good' },
        attention: { pillClass: 'pill-attention',  border: 'border-attention', label: 'Needs Attention' },
        critical:  { pillClass: 'pill-critical',   border: 'border-critical',  label: 'Critical' },
    }[status];
}

function indicatorIcon(type, state) {
    const icons = { water: 'water_drop', light: 'wb_sunny', temp: 'thermostat' };
    const labels = { water: 'Water', light: 'Light', temp: 'Temp' };
    const cls = { ok: 'icon-ok', warn: 'icon-warn', bad: 'icon-bad' }[state];
    const fill = state !== 'ok' ? '' : '';
    const fillSetting = state === 'ok' ? "'FILL' 1" : "'FILL' 0";
    return `
        <div class="flex flex-col items-center gap-0.5">
            <span class="material-symbols-outlined text-[20px] ${cls}" style="font-variation-settings:${fillSetting}">${icons[type]}</span>
            <span class="font-label-sm text-[10px] ${cls}">${labels[type]}</span>
        </div>`;
}

function healthBarColour(pct) {
    if (pct >= 80) return 'bg-primary';
    if (pct >= 60) return 'bg-primary/70';
    if (pct >= 40) return 'bg-tertiary';
    return 'bg-error';
}

function renderPlants() {
    const list = sortedFiltered();
    const container = document.getElementById('plant-list');
    const empty = document.getElementById('empty-state');
    container.innerHTML = '';

    if (list.length === 0) {
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');

    list.forEach((plant, idx) => {
        const meta = statusMeta(plant.status);
        const card = document.createElement('div');
        card.className = `plant-card bg-surface-container-lowest rounded-2xl border-l-4 ${meta.border} border border-outline-variant/20 shadow-sm overflow-hidden`;
        card.style.animationDelay = (idx * 0.05) + 's';

        card.innerHTML = `
            <div class="flex items-start gap-md p-md">
                <!-- Plant image -->
                <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 border border-outline-variant/20">
                    <img src="${plant.img}" alt="${plant.name}" class="w-full h-full object-cover"/>
                </div>
                <!-- Main info -->
                <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2 mb-1">
                        <div class="min-w-0">
                            <h4 class="font-label-lg text-on-surface truncate">${plant.name}</h4>
                            <p class="font-label-sm text-outline italic">${plant.species}</p>
                        </div>
                        <span class="font-label-sm px-2 py-0.5 rounded-full flex-shrink-0 ${meta.pillClass}">${meta.label}</span>
                    </div>
                    <div class="flex items-center gap-1 mb-sm">
                        <span class="material-symbols-outlined text-[14px] text-outline">location_on</span>
                        <span class="font-label-sm text-outline">${plant.location}</span>
                    </div>
                    <!-- Health bar -->
                    <div class="flex items-center gap-2 mb-sm">
                        <div class="flex-1 h-2 bg-surface-container rounded-full overflow-hidden">
                            <div class="health-bar-fill h-full rounded-full ${healthBarColour(plant.healthPct)}" style="width:0%" data-target="${plant.healthPct}"></div>
                        </div>
                        <span class="font-label-sm text-on-surface-variant flex-shrink-0 w-8 text-right">${plant.healthPct}%</span>
                    </div>
                    <!-- Urgent action -->
                    ${plant.urgentAction ? `
                    <div class="flex items-center gap-1 mb-sm">
                        <span class="material-symbols-outlined text-[14px] ${plant.status === 'critical' ? 'text-error' : 'text-tertiary'}" style="font-variation-settings:'FILL' 1">priority_high</span>
                        <span class="font-label-sm ${plant.status === 'critical' ? 'text-error' : 'text-on-tertiary-fixed-variant'}">${plant.urgentAction}</span>
                    </div>` : `
                    <div class="flex items-center gap-1 mb-sm">
                        <span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings:'FILL' 1">check_circle</span>
                        <span class="font-label-sm text-primary">All good — no action needed</span>
                    </div>`}
                    <!-- Indicators row -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-md">
                            ${indicatorIcon('water', plant.water)}
                            ${indicatorIcon('light', plant.light)}
                            ${indicatorIcon('temp', plant.temp)}
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="font-label-sm text-outline">${plant.lastCared}</span>
                            <button onclick="openLogPanel(${plant.id})" class="flex items-center gap-1 bg-primary text-on-primary font-label-lg text-label-lg px-3 py-1.5 rounded-full active:scale-95 transition-transform text-[12px]">
                                <span class="material-symbols-outlined text-[14px]">edit_note</span>
                                Log Care
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Care log history (collapsed) -->
            ${plant.careLogs.length > 0 ? `
            <div class="border-t border-outline-variant/20 px-md py-sm bg-surface-container/40">
                <p class="font-label-sm text-outline uppercase tracking-wider mb-1">Recent Care</p>
                ${plant.careLogs.slice(-2).map(l => `
                    <div class="flex items-center gap-2 py-0.5">
                        <span class="material-symbols-outlined text-[14px] text-primary">check</span>
                        <span class="font-label-sm text-on-surface-variant">${l.action} · ${l.date}${l.note ? ' — ' + l.note : ''}</span>
                    </div>`).join('')}
            </div>` : ''}
        `;
        container.appendChild(card);
    });

    // Animate health bars after paint
    setTimeout(() => {
        document.querySelectorAll('.health-bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.target + '%';
        });
    }, 80);
}

// ─── Seasonal Tips ────────────────────────────────────────────────────────────
function renderTips() {
    const tipsContainer = document.getElementById('tips-list');
    const criticalPlants = plants.filter(p => p.status === 'critical');
    const attentionPlants = plants.filter(p => p.status === 'attention');
    const lowLightPlants = plants.filter(p => p.light === 'bad' || p.light === 'warn');

    const tips = [];

    if (criticalPlants.length > 0)
        tips.push({ icon: 'water_drop', colour: 'bg-error-container text-on-error-container', title: 'Urgent: Water overdue', body: `${criticalPlants.map(p=>p.name).join(' and ')} ${criticalPlants.length > 1 ? 'are' : 'is'} critically dehydrated. Water thoroughly and check drainage.` });

    if (lowLightPlants.length > 0)
        tips.push({ icon: 'wb_sunny', colour: 'bg-tertiary-fixed text-on-tertiary-fixed-variant', title: 'Light check needed', body: `${lowLightPlants.map(p=>p.name).join(', ')} ${lowLightPlants.length > 1 ? 'aren\'t getting' : 'isn\'t getting'} enough — or too much — light. Try rotating or relocating.` });

    tips.push({ icon: 'thermostat', colour: 'bg-primary-fixed text-on-primary-fixed-variant', title: 'Autumn tip', body: 'As temperatures drop, move tropical plants away from cold windows and reduce watering frequency by about 20%.' });

    tips.push({ icon: 'compost', colour: 'bg-secondary-container text-on-secondary-container', title: 'Fertilising season ending', body: 'Stop feeding most houseplants in autumn — they slow growth in winter and excess fertiliser can burn roots.' });

    tipsContainer.innerHTML = tips.map(t => `
        <div class="tip-card rounded-2xl p-md flex items-start gap-md border border-outline-variant/20">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${t.colour}">
                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1">${t.icon}</span>
            </div>
            <div>
                <h4 class="font-label-lg text-on-surface mb-0.5">${t.title}</h4>
                <p class="font-body-md text-on-surface-variant">${t.body}</p>
            </div>
        </div>
    `).join('');
}

// ─── Log Care Panel ───────────────────────────────────────────────────────────
function openLogPanel(plantId) {
    logTargetId = plantId;
    selectedCareAction = null;
    const plant = plants.find(p => p.id === plantId);
    document.getElementById('log-plant-name').textContent = plant.name;
    document.getElementById('log-plant-loc').textContent = plant.location;
    document.getElementById('log-plant-img').src = plant.img;
    document.getElementById('log-plant-img').alt = plant.name;
    document.getElementById('log-notes').value = '';

    const grid = document.getElementById('care-action-grid');
    grid.innerHTML = careActions.map(a => `
        <button onclick="selectCareAction('${a.id}')" id="care-${a.id}"
            class="care-action-btn flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-outline-variant/40 bg-surface-container transition-all">
            <span class="material-symbols-outlined text-primary text-[24px]" style="font-variation-settings:'FILL' 1">${a.icon}</span>
            <span class="font-label-sm text-on-surface">${a.label}</span>
        </button>
    `).join('');

    document.getElementById('log-panel').classList.add('open');
    document.getElementById('log-overlay').classList.remove('hidden');
}

function selectCareAction(id) {
    selectedCareAction = id;
    document.querySelectorAll('.care-action-btn').forEach(btn => {
        btn.classList.remove('border-primary', 'bg-primary-fixed/30');
        btn.classList.add('border-outline-variant/40', 'bg-surface-container');
    });
    const btn = document.getElementById('care-' + id);
    btn.classList.add('border-primary', 'bg-primary-fixed/30');
    btn.classList.remove('border-outline-variant/40', 'bg-surface-container');
}

function closeLogPanel() {
    document.getElementById('log-panel').classList.remove('open');
    document.getElementById('log-overlay').classList.add('hidden');
    logTargetId = null;
}

function saveLog() {
    if (!selectedCareAction) { alert('Please select what you did.'); return; }
    const plant = plants.find(p => p.id === logTargetId);
    const action = careActions.find(a => a.id === selectedCareAction);
    const note = document.getElementById('log-notes').value.trim();

    // Log the care
    plant.careLogs.push({ action: action.label, date: 'Today', note });

    // Update plant state based on action
    if (selectedCareAction === 'water') {
        plant.water = 'ok';
        plant.lastCared = 'Today';
        plant.healthPct = Math.min(100, plant.healthPct + 20);
        plant.urgentAction = plant.urgentAction?.toLowerCase().includes('water') ? null : plant.urgentAction;
    } else if (selectedCareAction === 'mist') {
        plant.temp = 'ok';
        plant.healthPct = Math.min(100, plant.healthPct + 8);
    } else if (selectedCareAction === 'rotate') {
        plant.light = 'ok';
        plant.healthPct = Math.min(100, plant.healthPct + 5);
        plant.urgentAction = plant.urgentAction?.toLowerCase().includes('sun') || plant.urgentAction?.toLowerCase().includes('light') ? null : plant.urgentAction;
    } else {
        plant.healthPct = Math.min(100, plant.healthPct + 5);
        plant.lastCared = 'Today';
    }

    // Recalculate status from healthPct
    if (plant.healthPct >= 80) plant.status = 'thriving';
    else if (plant.healthPct >= 60) plant.status = 'good';
    else if (plant.healthPct >= 35) plant.status = 'attention';
    else plant.status = 'critical';

    closeLogPanel();
    renderAll();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function renderAll() {
    renderScore();
    renderPlants();
    renderTips();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLogPanel(); });

renderAll();
</script>
</body></html>
