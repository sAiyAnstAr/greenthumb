<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Community - Greenthumb</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #faf9f5;
}

.material-symbols-outlined {
    font-variation-settings:
    'FILL' 0,
    'wght' 400,
    'GRAD' 0,
    'opsz' 24;
}

.post-card {
    animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.skeleton {
    background: linear-gradient(90deg,#efeeea 25%,#e3e2df 50%,#efeeea 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
}

@keyframes shimmer {
    0% { background-position: 200% 0 }
    100% { background-position: -200% 0 }
}
</style>
</head>

<body class="bg-background text-on-surface min-h-screen pb-32">

<header class="bg-white border-b sticky top-0 z-40">
<div class="max-w-screen-lg mx-auto px-4 py-4 flex items-center justify-between">
<h1 class="text-3xl font-bold text-green-900">Greenthumb Community</h1>
<button onclick="openNewPost()" class="bg-green-800 text-white px-5 py-2 rounded-xl flex items-center gap-2">
<span class="material-symbols-outlined">add</span>
<span>Post</span>
</button>
</div>
</header>

<main class="max-w-screen-lg mx-auto p-4">

<div class="mb-6">
<input
id="search-input"
oninput="filterBySearch(this.value)"
placeholder="Search posts..."
class="w-full p-4 rounded-xl border"
type="text"
/>
</div>

<div id="feed" class="space-y-6">
<div class="skeleton h-48 rounded-2xl"></div>
<div class="skeleton h-48 rounded-2xl"></div>
</div>

<div id="empty-state" class="hidden text-center py-20">
<p class="text-2xl text-gray-500">No posts yet.</p>
</div>

</main>

<div id="post-overlay" class="hidden fixed inset-0 bg-black/40 z-40"></div>

<div id="new-post-panel" class="hidden fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl p-6 z-50 shadow-2xl max-h-[90vh] overflow-y-auto">

<div class="flex items-center justify-between mb-6">
<h2 class="text-2xl font-bold">Create Post</h2>
<button onclick="closeNewPost()">
<span class="material-symbols-outlined">close</span>
</button>
</div>

<div class="space-y-4">

<select id="post-category" class="w-full p-3 rounded-xl border">
<option value="">Select Category</option>
<option value="help">Help Needed</option>
<option value="tips">Plant Tips</option>
<option value="showcase">Showcase</option>
<option value="swap">Swap</option>
</select>

<input
id="post-title"
type="text"
placeholder="Post title"
class="w-full p-3 rounded-xl border"
/>

<textarea
id="post-body"
rows="5"
placeholder="Write something..."
class="w-full p-3 rounded-xl border"
></textarea>

<input id="post-img-input" type="file" accept="image/*" />

<button
onclick="submitPost()"
id="submit-post-btn"
class="w-full bg-green-800 text-white py-3 rounded-xl"
>
Share with Community
</button>

<p id="post-error" class="hidden text-red-600"></p>

</div>
</div>

<script>

const sb = supabase.createClient(
    'https://vgvldoegptvzijlpsrtu.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndmxkb2VncHR2emlqbHBzcnR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzA1NTIsImV4cCI6MjA5NDUwNjU1Mn0.A1gFTHM2ahB4XUwZ_274mAPXL2uq0cwy4nWgl6wuR-c'
);

let allPosts = [];
let currentSearch = '';
let isSubmitting = false;

const CAT_META = {
    help: {
        label: 'Help Needed',
        cls: 'bg-red-100 text-red-700'
    },
    tips: {
        label: 'Plant Tips',
        cls: 'bg-green-100 text-green-700'
    },
    showcase: {
        label: 'Showcase',
        cls: 'bg-blue-100 text-blue-700'
    },
    swap: {
        label: 'Swap',
        cls: 'bg-yellow-100 text-yellow-700'
    }
};

function catMeta(c) {
    return CAT_META[c] || {
        label: c,
        cls: 'bg-gray-100 text-gray-700'
    };
}

function timeAgo(iso) {

    const seconds = (Date.now() - new Date(iso)) / 1000;

    if (seconds < 60) return 'just now';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';

    return Math.floor(seconds / 86400) + 'd ago';
}

function initials(name) {

    return ((name || 'G')
        .split(' ')
        .map(w => w[0] || '')
        .join('')
        .slice(0, 2) || 'G')
        .toUpperCase();
}

async function loadPosts() {

    const feed = document.getElementById('feed');

    try {

        const { data, error } = await sb
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        allPosts = data || [];

        renderFeed();

    } catch (err) {

        feed.innerHTML = `
            <div class="bg-red-100 text-red-700 p-6 rounded-2xl text-center">
                ${err.message}
            </div>
        `;
    }
}

function renderFeed() {

    const feed = document.getElementById('feed');
    const empty = document.getElementById('empty-state');

    let posts = [...allPosts];

    if (currentSearch.trim()) {

        const q = currentSearch.toLowerCase();

        posts = posts.filter(p =>
            p.title.toLowerCase().includes(q) ||
            (p.body || '').toLowerCase().includes(q)
        );
    }

    if (!posts.length) {

        feed.innerHTML = '';
        empty.classList.remove('hidden');
        return;
    }

    empty.classList.add('hidden');

    feed.innerHTML = posts.map(p => {

        const meta = catMeta(p.category);
        const ini = initials(p.author);

        return `
        <article class="post-card bg-white rounded-2xl shadow border overflow-hidden">

            <div class="p-5 flex items-center justify-between">

                <div class="flex items-center gap-3">

                    <div class="w-10 h-10 rounded-full bg-green-200 flex items-center justify-center font-bold">
                        ${ini}
                    </div>

                    <div>
                        <p class="font-semibold">${p.author}</p>
                        <p class="text-sm text-gray-500">${timeAgo(p.created_at)}</p>
                    </div>

                </div>

                <span class="px-3 py-1 rounded-full text-sm ${meta.cls}">
                    ${meta.label}
                </span>

            </div>

            <div class="px-5 pb-5">
                <h2 class="text-2xl font-bold mb-2">${p.title}</h2>
                <p class="text-gray-700 whitespace-pre-wrap">${p.body || ''}</p>
            </div>

            ${p.image_url ? `
            <img src="${p.image_url}" class="w-full object-cover max-h-96" />
            ` : ''}

            <div class="flex items-center gap-6 border-t px-5 py-4">

                <button onclick="likePost('${p.id}', this)" class="flex items-center gap-2">
                    <span class="material-symbols-outlined">favorite_border</span>
                    <span>${p.likes || 0}</span>
                </button>

                <button onclick="deletePost('${p.id}')" class="ml-auto text-red-600 flex items-center gap-2">
                    <span class="material-symbols-outlined">delete</span>
                    <span>Delete</span>
                </button>

            </div>

        </article>
        `;

    }).join('');
}

function filterBySearch(value) {
    currentSearch = value;
    renderFeed();
}

async function likePost(id, btn) {

    const post = allPosts.find(p => p.id === id);

    if (!post) return;

    post.likes = (post.likes || 0) + 1;

    renderFeed();

    await sb
        .from('posts')
        .update({ likes: post.likes })
        .eq('id', id);
}

async function deletePost(id){

    if(!confirm('Delete this post?')) return;

    try {

        const { error } = await sb
            .from('posts')
            .delete()
            .eq('id', id);

        if(error){
            throw error;
        }

        allPosts = allPosts.filter(function(p){
            return p.id !== id;
        });

        renderFeed();

    } catch(err){

        console.error('Delete failed:', err.message);

        alert('Could not delete post: ' + err.message);

        loadPosts();
    }
}

function openNewPost() {

    document.getElementById('new-post-panel').classList.remove('hidden');
    document.getElementById('post-overlay').classList.remove('hidden');
}

function closeNewPost() {

    document.getElementById('new-post-panel').classList.add('hidden');
    document.getElementById('post-overlay').classList.add('hidden');
}

async function submitPost() {

    if (isSubmitting) return;

    const title = document.getElementById('post-title').value.trim();
    const body = document.getElementById('post-body').value.trim();
    const category = document.getElementById('post-category').value;
    const imageFile = document.getElementById('post-img-input').files[0];

    const errEl = document.getElementById('post-error');

    errEl.classList.add('hidden');

    if (!title) {

        errEl.textContent = 'Please add a title';
        errEl.classList.remove('hidden');
        return;
    }

    if (!category) {

        errEl.textContent = 'Please select a category';
        errEl.classList.remove('hidden');
        return;
    }

    isSubmitting = true;

    const btn = document.getElementById('submit-post-btn');

    btn.disabled = true;
    btn.textContent = 'Posting...';

    try {

        let imageUrl = null;

        if (imageFile) {

            const ext = imageFile.name.split('.').pop();
            const path = `${Date.now()}.${ext}`;

            const upload = await sb
                .storage
                .from('post-images')
                .upload(path, imageFile);

            if (!upload.error) {

                imageUrl = sb
                    .storage
                    .from('post-images')
                    .getPublicUrl(path)
                    .data
                    .publicUrl;
            }
        }

        const { data, error } = await sb
            .from('posts')
            .insert({
                author: 'Gardener',
                category,
                title,
                body,
                image_url: imageUrl,
                likes: 0
            })
            .select()
            .single();

        if (error) throw error;

        allPosts.unshift(data);

        renderFeed();

        closeNewPost();

        document.getElementById('post-title').value = '';
        document.getElementById('post-body').value = '';
        document.getElementById('post-category').value = '';
        document.getElementById('post-img-input').value = '';

    } catch (err) {

        errEl.textContent = err.message;
        errEl.classList.remove('hidden');

    } finally {

        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = 'Share with Community';
    }
}

sb.channel('posts')

.on(
    'postgres_changes',
    {
        event:'INSERT',
        schema:'public',
        table:'posts'
    },
    function(payload){

        if(!allPosts.find(function(p){
            return p.id === payload.new.id;
        })){

            allPosts.unshift(payload.new);

            renderFeed();
        }
    }
)

.on(
    'postgres_changes',
    {
        event:'DELETE',
        schema:'public',
        table:'posts'
    },
    function(payload){

        allPosts = allPosts.filter(function(p){
            return p.id !== payload.old.id;
        });

        renderFeed();
    }
)

.subscribe();
    
loadPosts();

</script>

</body>
</html>
