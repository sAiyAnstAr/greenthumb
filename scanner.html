<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Greenthumb - Scanner</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"> <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" /> <style> body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; } .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } </style> </head> <body class="h-screen flex flex-col"> <!-- Viewfinder Area --> <div class="relative flex-1 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1530836361253-e1105d1c4848?auto=format&fit=crop&w=800&q=80');"> <!-- Top Controls --> <div class="absolute top-0 left-0 w-full p-6 flex justify-between items-center bg-gradient-to-b from-black/50 to-transparent"> <a href="index.html" class="p-2 bg-white/10 rounded-full backdrop-blur-md text-white flex items-center justify-center"> <span class="material-symbols-outlined">arrow_back</span> </a> <div class="flex gap-4"> <button class="p-2 bg-white/10 rounded-full backdrop-blur-md"><span class="material-symbols-outlined text-white">flash_on</span></button> <button class="p-2 bg-white/10 rounded-full backdrop-blur-md"><span class="material-symbols-outlined text-white">settings</span></button> </div> </div> <!-- Scanner Overlay --> <div class="absolute inset-0 flex items-center justify-center p-12"> <div class="w-full aspect-square border-2 border-white/30 rounded-[40px] relative"> <div class="absolute -top-1 -left-1 w-12 h-12 border-t-4 border-l-4 border-green-400 rounded-tl-[40px]"></div> <div class="absolute -top-1 -right-1 w-12 h-12 border-t-4 border-r-4 border-green-400 rounded-tr-[40px]"></div> <div class="absolute -bottom-1 -left-1 w-12 h-12 border-b-4 border-l-4 border-green-400 rounded-bl-[40px]"></div> <div class="absolute -bottom-1 -right-1 w-12 h-12 border-b-4 border-r-4 border-green-400 rounded-br-[40px]"></div> <!-- Scanning Animation Line --> <div class="absolute top-0 left-0 w-full h-1 bg-green-400/50 shadow-[0_0_15px_rgba(74,222,128,0.8)] animate-pulse" style="animation: scan 3s infinite linear;"></div> </div> </div> <style> @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } } </style> <!-- Tooltip --> <div class="absolute bottom-32 left-0 w-full flex justify-center"> <div class="bg-black/60 backdrop-blur-xl px-6 py-3 rounded-full border border-white/10 text-sm font-semibold tracking-wide flex items-center gap-2"> <span class="material-symbols-outlined text-green-400 text-lg">info</span> Position leaf clearly in the frame </div> </div> </div> <!-- Capture Controls --> <div class="h-48 bg-stone-950 flex flex-col items-center justify-center gap-6 pb-8"> <div class="flex items-center gap-12"> <button class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center text-stone-400"> <span class="material-symbols-outlined">photo_library</span> </button> <button class="w-20 h-20 bg-white rounded-full p-1.5 active:scale-95 transition-transform"> <div class="w-full h-full border-4 border-stone-950 rounded-full flex items-center justify-center"> <div class="w-14 h-14 bg-green-600 rounded-full"></div> </div> </button> <button class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center text-stone-400"> <span class="material-symbols-outlined">cached</span> </button> </div> <div class="flex gap-6 text-[10px] font-black uppercase tracking-[0.2em] text-stone-500"> <span>Diagnose</span> <span class="text-white border-b-2 border-green-500 pb-1">Identify</span> <span>Care</span> </div> </div> </body> </html>
