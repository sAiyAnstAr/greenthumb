        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .scanner-viewfinder {
            position: relative;
            overflow: hidden;
        }
        .scanner-viewfinder::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 240px;
            height: 240px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }
        .scanner-corners {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 260px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .scanner-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #bcf0ae;
        }
        .corner-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; border-top-left-radius: 32px; }
        .corner-tr { top: 0; right: 0; border-left: 0; border-bottom: 0; border-top-right-radius: 32px; }
        .corner-bl { bottom: 0; left: 0; border-right: 0; border-top: 0; border-bottom-left-radius: 32px; }
        .corner-br { bottom: 0; right: 0; border-left: 0; border-top: 0; border-bottom-right-radius: 32px; }
    </style>
