<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Greenthumb - Live Scanner</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"> <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" /> <style> body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; margin: 0; overflow: hidden; } .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } @keyframes scan { 0% { transform: translateY(0); opacity: 0.2; } 50% { opacity: 0.8; } 100% { transform: translateY(100%); opacity: 0.2; } } #flash { pointer-events: none; transition: opacity 0.15s ease-out; } </style> </head> <body class="h-screen flex flex-col"> <!-- Flash Effect Overlay --> <div id="flash" class="fixed inset-0 bg-white opacity-0 z-[100]"></div> <!-- Live Scanner View --> <div class="relative flex-1 bg-stone-900 overflow-hidden"> <!-- Live Video Element --> <video id="viewfinder" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover"></video> <!-- Top Bar --> <header class="absolute top-0 w-full p-6 flex justify-between items-center bg-gradient-to-b from-black/60 to-transparent z-50"> <a href="index.html" class="p-2 bg-white/10 backdrop-blur-md rounded-full text-white"> <span class="material-symbols-outlined">close</span> </a> <h1 class="text-white font-bold tracking-tight text-lg">Plant Identifier</h1> <button class="p-2 bg-white/10 backdrop-blur-md rounded-full text-white"> <span class="material-symbols-outlined">flash_on</span> </button> </header> <!-- Analysis HUD --> <div class="absolute inset-0 flex items-center justify-center p-8 z-10"> <div class="w-full aspect-square border-2 border-white/20 rounded-[48px] relative overflow-hidden"> <!-- Scanning Line --> <div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-green-400/30 to-transparent animate-[scan_3s_infinite_ease-in-out]"></div> <!-- HUD Elements --> <div class="absolute top-10 left-10 flex items-center gap-3 bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/10"> <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div> <p class="text-[10px] font-black text-white uppercase tracking-widest">Analyzing leaf texture...</p> </div> </div> </div> </div> <!-- Controls Drawer --> <div class="bg-stone-50 rounded-t-[40px] px-8 pt-10 pb-12 space-y-8 shadow-2xl relative z-50"> <div class="flex items-center justify-center gap-12"> <button class="w-14 h-14 bg-white rounded-full shadow-sm border border-stone-100 flex items-center justify-center text-stone-400"> <span class="material-symbols-outlined">photo_library</span> </button> <button id="captureBtn" class="w-24 h-24 bg-green-800 rounded-full p-2 active:scale-95 transition-transform flex items-center justify-center shadow-xl shadow-green-900/20"> <div class="w-full h-full border-4 border-white/20 rounded-full flex items-center justify-center"> <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center"> <span class="material-symbols-outlined text-green-800 text-4xl">eco</span> </div> </div> </button> <button class="w-14 h-14 bg-white rounded-full shadow-sm border border-stone-100 flex items-center justify-center text-stone-400"> <span class="material-symbols-outlined">cached</span> </button> </div> <!-- Mode Selector --> <div class="flex justify-center gap-8"> <span class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-300">Diagnose</span> <span class="text-[10px] font-black uppercase tracking-[0.2em] text-green-800 border-b-2 border-green-800 pb-1">Identify</span> <span class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-300">Care</span> </div> </div> <!-- Script for Camera Engine --> <script> const video = document.getElementById('viewfinder'); const captureBtn = document.getElementById('captureBtn'); const flash = document.getElementById('flash'); // 1. Request Camera Access async function startCamera() { try { const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); video.srcObject = stream; } catch (err) { console.error("Camera access denied:", err); alert("Please enable camera permissions in your browser settings to use the scanner."); } } // 2. Capture Simulation captureBtn.addEventListener('click', () => { // Visual Flash flash.style.opacity = '1'; setTimeout(() => { flash.style.opacity = '0'; // Wait for flash to fade then navigate setTimeout(() => { window.location.href = 'scanner-result.html'; }, 150); }, 100); }); // Start on load window.addEventListener('load', startCamera); </script> </body> </html>
